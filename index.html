<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon Gen I - Pikachu</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="card">
      <div class="left-panel">
        <div class="logo">Pokemon</div>

        <div class="eyebrow">POKEMON GEN I</div>
        <h1>Pikachu</h1>
        <p class="description">
          Pikachu is an Electric-type Pokémon introduced in Generation I.
          Pikachu are small, chubby, and incredibly cute mouse-like Pokémon.
          They are almost completely covered by yellow fur.
        </p>

        <div class="pagination">
          <div class="line"></div>
          <div class="count">01 / 08</div>
        </div>

        <div class="pokeball">
          <svg
            viewBox="0 0 100 100"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <circle cx="50" cy="50" r="48" stroke="black" stroke-width="4" />
            <line
              x1="2"
              y1="50"
              x2="98"
              y2="50"
              stroke="black"
              stroke-width="4"
            />
            <circle
              cx="50"
              cy="50"
              r="14"
              fill="#fbe6ab"
              stroke="black"
              stroke-width="4"
            />
          </svg>
        </div>
      </div>

      <div class="right-panel">
        <div class="dots-nav">
          <span class="active"></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>

      <div class="menu-icon">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="pikachu-wrapper">
        <img src="Pokemon-Pikachu-PNG.png" alt="Pikachu" />
      </div>
    </div>
  </body>
</html>
